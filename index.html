<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Chain Management System - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 400px;
            padding: 40px;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
        }
        
        .demo-credentials {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
        }
        
        .demo-credentials p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">SCM</div>
            <h1>Welcome Back</h1>
            <p>Supply Chain Management System</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="AhmedIsmail" placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="AhmedIsmail" placeholder="Enter your password">
            </div>
            
            <button type="submit" class="login-btn">Login to Dashboard</button>
        </form>
        
        <div class="demo-credentials">
            <p><strong>Demo Credentials:</strong></p>
            <p>Username: AhmedIsmail</p>
            <p>Password: AhmedIsmail</p>
        </div>
    </div>
    
<!-- Simple Background Data Loading -->
<script>
    // Load data in background after login
    async function loadDataAfterLogin() {
        console.log('Loading data in background...');
        
        const dataFiles = ['inventory', 'suppliers', 'procurement', 'orders', 'costs'];
        
        for (const file of dataFiles) {
            try {
                // Try multiple paths
                const paths = [
                    `data/${file}.json`,
                    `./data/${file}.json`,
                    `/data/${file}.json`,
                    `/AI_SCMS/data/${file}.json`
                ];
                
                for (const path of paths) {
                    try {
                        const response = await fetch(path);
                        if (response.ok) {
                            const data = await response.json();
                            
                            // Handle different JSON structures
                            if (Array.isArray(data)) {
                                localStorage.setItem(file, JSON.stringify(data));
                            } else if (data[file]) {
                                localStorage.setItem(file, JSON.stringify(data[file]));
                            }
                            
                            console.log(`✅ Loaded ${file}`);
                            break;
                        }
                    } catch (e) {
                        // Try next path
                    }
                }
            } catch (error) {
                console.error(`Error loading ${file}:`, error);
            }
        }
        
        console.log('✅ All data loaded');
    }
    
    // Modify login form
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.onsubmit = async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                if (username === 'AhmedIsmail' && password === 'AhmedIsmail') {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('username', username);
                    
                    // Start loading data in background
                    loadDataAfterLogin();
                    
                    // Redirect immediately
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Invalid credentials! Use AhmedIsmail/AhmedIsmail');
                }
            };
        }
    });
</script>
</body>
</html>
