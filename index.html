<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Chain Management System - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 400px;
            padding: 40px;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
        }
        
        .demo-credentials {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
        }
        
        .demo-credentials p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">SCM</div>
            <h1>Welcome Back</h1>
            <p>Supply Chain Management System</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="AhmedIsmail" placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="AhmedIsmail" placeholder="Enter your password">
            </div>
            
            <button type="submit" class="login-btn">Login to Dashboard</button>
        </form>
        
        <div class="demo-credentials">
            <p><strong>Demo Credentials:</strong></p>
            <p>Username: AhmedIsmail</p>
            <p>Password: AhmedIsmail</p>
        </div>
    </div>
    
<script>
    // Show loading overlay while loading data
    function showLoadingOverlay() {
        // Remove existing overlay if any
        const existingOverlay = document.getElementById('data-loading-overlay');
        if (existingOverlay) existingOverlay.remove();
        
        const overlay = document.createElement('div');
        overlay.id = 'data-loading-overlay';
        overlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        `;
        
        overlay.innerHTML = `
            <div style="
                background: white;
                padding: 40px;
                border-radius: 15px;
                text-align: center;
                max-width: 450px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.4);
                animation: slideUp 0.5s ease;
            ">
                <div style="font-size: 60px; margin-bottom: 20px; animation: bounce 1s infinite;">📦</div>
                <h2 style="margin-bottom: 15px; color: #2c3e50;">Loading Your System</h2>
                <p style="color: #666; margin-bottom: 25px;">Please wait while we prepare your Supply Chain Management System...</p>
                
                <div style="
                    width: 100%;
                    height: 6px;
                    background: #ecf0f1;
                    border-radius: 3px;
                    overflow: hidden;
                    margin-bottom: 15px;
                ">
                    <div id="loading-progress" style="
                        width: 0%;
                        height: 100%;
                        background: linear-gradient(90deg, #3498db, #2ecc71);
                        transition: width 0.4s ease;
                    "></div>
                </div>
                
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <div class="loading-spinner" style="
                        width: 20px;
                        height: 20px;
                        border: 3px solid #f3f3f3;
                        border-top: 3px solid #3498db;
                        border-radius: 50%;
                        animation: spin 1s linear infinite;
                    "></div>
                    <p id="loading-status" style="margin: 0; font-size: 14px; color: #7f8c8d; font-weight: 500;">Initializing...</p>
                </div>
                
                <div style="margin-top: 25px; font-size: 12px; color: #bdc3c7;">
                    Loading inventory, suppliers, orders and more...
                </div>
            </div>
        `;
        
        document.body.appendChild(overlay);
    }
    
    function updateLoadingProgress(percent, message) {
        const progress = document.getElementById('loading-progress');
        const status = document.getElementById('loading-status');
        if (progress) progress.style.width = percent + '%';
        if (status) status.textContent = message;
    }
    
    function hideLoadingOverlay() {
        const overlay = document.getElementById('data-loading-overlay');
        if (overlay) {
            overlay.style.opacity = '0';
            setTimeout(() => {
                if (overlay.parentNode) {
                    overlay.parentNode.removeChild(overlay);
                }
            }, 500);
        }
    }
    
    // Load all data after successful login
    async function loadAllDataAfterLogin() {
        showLoadingOverlay();
        
        try {
            // Define all data files to load
            const dataFiles = [
                { name: 'inventory', label: 'Inventory data' },
                { name: 'suppliers', label: 'Supplier data' },
                { name: 'procurement', label: 'Procurement data' },
                { name: 'orders', label: 'Order data' },
                { name: 'costs', label: 'Cost data' }
            ];
            
            let completed = 0;
            const total = dataFiles.length;
            
            // Load each data file
            for (const file of dataFiles) {
                updateLoadingProgress(
                    Math.round((completed / total) * 100),
                    `Loading ${file.label}...`
                );
                
                await loadDataFile(file.name);
                
                completed++;
                updateLoadingProgress(
                    Math.round((completed / total) * 100),
                    `Loaded ${file.label}`
                );
                
                // Small delay for visual feedback
                await new Promise(resolve => setTimeout(resolve, 300));
            }
            
            updateLoadingProgress(100, 'System ready!');
            
            // Add 2 second delay before redirecting to dashboard
            updateLoadingProgress(100, 'System ready! Redirecting in 3 seconds...');
            
            // Wait 2 seconds
            await new Promise(resolve => setTimeout(resolve, 3000));
            
            // Redirect to dashboard after data is loaded + 2 second delay
            window.location.href = 'dashboard.html';
            
        } catch (error) {
            console.error('Error loading data:', error);
            updateLoadingProgress(100, 'Error loading data. Redirecting...');
            
            // Still wait 2 seconds even on error
            await new Promise(resolve => setTimeout(resolve, 3000));
            
            window.location.href = 'dashboard.html';
        }
    }
    
    // Load individual data file
    async function loadDataFile(filename) {
        return new Promise(async (resolve) => {
            try {
                // Try multiple possible paths
                const paths = [
                    `data/${filename}.json`,
                    `./data/${filename}.json`,
                    `/data/${filename}.json`,
                    `/AI_SCMS/data/${filename}.json`,
                    `../data/${filename}.json`
                ];
                
                let data = null;
                
                for (const path of paths) {
                    try {
                        console.log(`Trying to load ${filename} from:`, path);
                        const response = await fetch(path);
                        if (response.ok) {
                            data = await response.json();
                            console.log(`✅ Successfully loaded ${filename} from:`, path);
                            break;
                        }
                    } catch (e) {
                        // Continue to next path
                    }
                }
                
                if (data) {
                    // Handle different JSON structures
                    if (Array.isArray(data)) {
                        localStorage.setItem(filename, JSON.stringify(data));
                    } else if (data[filename] && Array.isArray(data[filename])) {
                        localStorage.setItem(filename, JSON.stringify(data[filename]));
                    } else {
                        // Try to find any array in the data
                        const firstKey = Object.keys(data)[0];
                        if (firstKey && Array.isArray(data[firstKey])) {
                            localStorage.setItem(filename, JSON.stringify(data[firstKey]));
                        } else {
                            console.warn(`No array found in ${filename}, using empty array`);
                            localStorage.setItem(filename, JSON.stringify([]));
                        }
                    }
                } else {
                    console.warn(`No data file found for ${filename}, using empty array`);
                    localStorage.setItem(filename, JSON.stringify([]));
                }
                
                resolve();
            } catch (error) {
                console.error(`Error loading ${filename}:`, error);
                localStorage.setItem(filename, JSON.stringify([]));
                resolve(); // Resolve anyway to continue loading
            }
        });
    }
    
    // Check if data needs to be loaded
    function needsDataLoad() {
        const dataTypes = ['inventory', 'suppliers', 'procurement', 'orders', 'costs'];
        let hasAnyData = false;
        
        for (const type of dataTypes) {
            const data = localStorage.getItem(type);
            if (data && JSON.parse(data).length > 0) {
                hasAnyData = true;
                break;
            }
        }
        
        return !hasAnyData;
    }
    
    // Clear any existing data (optional - uncomment if you want fresh data on every login)
    function clearExistingData() {
        const dataTypes = ['inventory', 'suppliers', 'procurement', 'orders', 'costs'];
        dataTypes.forEach(type => localStorage.removeItem(type));
        console.log('Existing data cleared');
    }
    
    // Handle login form submission
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginForm');
        if (!loginForm) return;
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Simple authentication
            if (username === 'AhmedIsmail' && password === 'AhmedIsmail') {
                // Set login status
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                
                // Clear existing data if you want fresh load every time
                // clearExistingData(); // Uncomment if you want fresh data on every login
                
                // Check if data needs to be loaded
                if (needsDataLoad()) {
                    console.log('No data found, loading from JSON files...');
                    await loadAllDataAfterLogin();
                    // Redirect happens in loadAllDataAfterLogin after data is loaded + 2 second delay
                } else {
                    console.log('Data already exists, redirecting with delay...');
                    // Show quick loading message
                    showLoadingOverlay();
                    updateLoadingProgress(100, 'Data already loaded!');
                    
                    // Update message for 2 second delay
                    updateLoadingProgress(100, 'Redirecting to dashboard in 3 seconds...');
                    
                    // Wait 2 seconds before redirecting
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 3000);
                }
            } else {
                alert('Invalid credentials! Use AhmedIsmail/AhmedIsmail');
            }
        });
    });
    
    // Add CSS animations
    const style = document.createElement('style');
    style.textContent = `
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
    `;
    document.head.appendChild(style);
</script>
</body>
</html>
