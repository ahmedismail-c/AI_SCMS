<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Chain Management System - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 400px;
            padding: 40px;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
        }
        
        .demo-credentials {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
        }
        
        .demo-credentials p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">SCM</div>
            <h1>Welcome Back</h1>
            <p>Supply Chain Management System</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="AhmedIsmail" placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="AhmedIsmail" placeholder="Enter your password">
            </div>
            
            <button type="submit" class="login-btn">Login to Dashboard</button>
        </form>
        
        <div class="demo-credentials">
            <p><strong>Demo Credentials:</strong></p>
            <p>Username: AhmedIsmail</p>
            <p>Password: AhmedIsmail</p>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Simple authentication (for demo purposes)
            if (username === 'AhmedIsmail' && password === 'AhmedIsmail') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid credentials! Use AhmedIsmail/AhmedIsmail');
            }
        });
    </script>
    <!-- Data Loading Script -->
<script>
    // Show loading overlay while loading data
    function showLoadingOverlay() {
        const overlay = document.createElement('div');
        overlay.id = 'data-loading-overlay';
        overlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        `;
        
        overlay.innerHTML = `
            <div style="
                background: white;
                padding: 30px;
                border-radius: 10px;
                text-align: center;
                max-width: 400px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            ">
                <div style="font-size: 50px; margin-bottom: 20px;">🔄</div>
                <h3 style="margin-bottom: 15px; color: #333;">Loading System Data</h3>
                <p style="color: #666; margin-bottom: 20px;">Please wait while we prepare your Supply Chain Management System...</p>
                <div style="
                    width: 100%;
                    height: 4px;
                    background: #f0f0f0;
                    border-radius: 2px;
                    overflow: hidden;
                ">
                    <div id="loading-progress" style="
                        width: 0%;
                        height: 100%;
                        background: linear-gradient(90deg, #3498db, #2ecc71);
                        transition: width 0.3s;
                    "></div>
                </div>
                <p id="loading-status" style="margin-top: 15px; font-size: 14px; color: #999;">Initializing...</p>
            </div>
        `;
        
        document.body.appendChild(overlay);
    }
    
    function updateLoadingProgress(percent, message) {
        const progress = document.getElementById('loading-progress');
        const status = document.getElementById('loading-status');
        if (progress) progress.style.width = percent + '%';
        if (status) status.textContent = message;
    }
    
    function hideLoadingOverlay() {
        const overlay = document.getElementById('data-loading-overlay');
        if (overlay) {
            overlay.style.opacity = '0';
            setTimeout(() => {
                if (overlay.parentNode) {
                    overlay.parentNode.removeChild(overlay);
                }
            }, 500);
        }
    }
    
    // Load all data in background
    async function loadAllDataInBackground() {
        showLoadingOverlay();
        
        try {
            // Check if Storage object exists
            if (typeof Storage === 'undefined') {
                console.error('Storage not loaded');
                updateLoadingProgress(30, 'Loading storage module...');
                await loadScript('js/utils/storage.js');
            }
            
            updateLoadingProgress(30, 'Loading inventory data...');
            await loadDataFile('inventory');
            
            updateLoadingProgress(50, 'Loading supplier data...');
            await loadDataFile('suppliers');
            
            updateLoadingProgress(70, 'Loading procurement data...');
            await loadDataFile('procurement');
            
            updateLoadingProgress(85, 'Loading order data...');
            await loadDataFile('orders');
            
            updateLoadingProgress(95, 'Loading cost data...');
            await loadDataFile('costs');
            
            updateLoadingProgress(100, 'System ready!');
            
            // Small delay to show 100%
            setTimeout(() => {
                hideLoadingOverlay();
            }, 500);
            
        } catch (error) {
            console.error('Error loading data:', error);
            updateLoadingProgress(100, 'Error loading data. Using defaults.');
            setTimeout(() => {
                hideLoadingOverlay();
            }, 2000);
        }
    }
    
    // Load script dynamically
    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
        });
    }
    
    // Load data file and store in localStorage
    async function loadDataFile(filename) {
        return new Promise(async (resolve, reject) => {
            try {
                // Try multiple paths
                const paths = [
                    `data/${filename}.json`,
                    `./data/${filename}.json`,
                    `/data/${filename}.json`,
                    `/AI_SCMS/data/${filename}.json`
                ];
                
                let data = null;
                
                for (const path of paths) {
                    try {
                        const response = await fetch(path);
                        if (response.ok) {
                            data = await response.json();
                            console.log(`✅ Loaded ${filename} from:`, path);
                            break;
                        }
                    } catch (e) {
                        // Continue to next path
                    }
                }
                
                if (data) {
                    // Handle different JSON structures
                    if (Array.isArray(data)) {
                        localStorage.setItem(filename, JSON.stringify(data));
                    } else if (data[filename]) {
                        localStorage.setItem(filename, JSON.stringify(data[filename]));
                    } else {
                        // Try to find any array in the data
                        const firstKey = Object.keys(data)[0];
                        if (firstKey && Array.isArray(data[firstKey])) {
                            localStorage.setItem(filename, JSON.stringify(data[firstKey]));
                        } else {
                            localStorage.setItem(filename, JSON.stringify([]));
                        }
                    }
                } else {
                    console.warn(`No data found for ${filename}, using empty array`);
                    localStorage.setItem(filename, JSON.stringify([]));
                }
                
                resolve();
            } catch (error) {
                console.error(`Error loading ${filename}:`, error);
                localStorage.setItem(filename, JSON.stringify([]));
                resolve(); // Resolve anyway to continue loading
            }
        });
    }
    
    // Check if data needs to be loaded
    function needsDataLoad() {
        const dataTypes = ['inventory', 'suppliers', 'procurement', 'orders', 'costs'];
        let hasData = false;
        
        for (const type of dataTypes) {
            if (localStorage.getItem(type)) {
                hasData = true;
                break;
            }
        }
        
        return !hasData;
    }
    
    // Modify login form submission
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            const originalSubmit = loginForm.onsubmit;
            
            loginForm.onsubmit = async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                // Simple authentication
                if (username === 'admin' && password === 'admin123') {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('username', username);
                    
                    // Check if data needs to be loaded
                    if (needsDataLoad()) {
                        await loadAllDataInBackground();
                        window.location.href = 'dashboard.html';
                    } else {
                        // Data already exists, just redirect
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    alert('Invalid credentials! Use admin/admin123');
                }
            };
        }
    });
    
    // Preload data in background even before login
    window.addEventListener('load', function() {
        // Silently preload data in background without showing overlay
        if (needsDataLoad()) {
            console.log('Preloading data in background...');
            // Load data silently without showing overlay
            Promise.all([
                loadDataFile('inventory'),
                loadDataFile('suppliers'),
                loadDataFile('procurement'),
                loadDataFile('orders'),
                loadDataFile('costs')
            ]).then(() => {
                console.log('✅ All data preloaded successfully');
            }).catch(error => {
                console.error('Error preloading data:', error);
            });
        }
    });
</script>

<!-- Add loading animation styles -->
<style>
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    .loading-spinner {
        animation: spin 1s linear infinite;
    }
</style>
</body>
</html>
