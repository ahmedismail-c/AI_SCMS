<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - Supply Chain Management System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="top-header">
                <div class="header-title">
                    <h2>Inventory Management</h2>
                    <p>Manage your stock and products</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="openAddItemModal()">
                        + Add New Item
                    </button>
                </div>
            </div>
            
            <!-- Filters -->
            <div class="card">
                <div class="filter-group">
                    <input type="text" id="searchInput" class="form-control" 
                           placeholder="Search by SKU, Name, or Category...">
                    <select id="categoryFilter" class="form-control">
                        <option value="">All Categories</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Office Supplies">Office Supplies</option>
                    </select>
                    <select id="stockFilter" class="form-control">
                        <option value="">All Stock Levels</option>
                        <option value="low">Low Stock Only</option>
                        <option value="normal">Normal Stock</option>
                    </select>
                </div>
            </div>
            
            <!-- Inventory Table -->
            <div class="card">
                <div class="table-container">
                    <table class="table" id="inventory-table">
                        <thead>
                            <tr>
                                <th>SKU</th>
                                <th>Product Name</th>
                                <th>Category</th>
                                <th>Quantity</th>
                                <th>Price</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-tbody">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Add Item Modal -->
    <div id="addItemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Inventory Item</h2>
                <button class="close-btn" onclick="closeModal('addItemModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addItemForm">
                    <div class="form-group">
                        <label>SKU</label>
                        <input type="text" id="sku" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" class="form-control" required>
                            <option value="Electronics">Electronics</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Office Supplies">Office Supplies</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="quantity" class="form-control" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" id="price" class="form-control" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="location" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Reorder Level</label>
                        <input type="number" id="reorderLevel" class="form-control" min="0" value="10" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="saveNewItem()">Save Item</button>
                <button class="btn" onclick="closeModal('addItemModal')">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Edit Item Modal -->
    <div id="editItemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Inventory Item</h2>
                <button class="close-btn" onclick="closeModal('editItemModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editItemForm">
                    <input type="hidden" id="edit-id">
                    <div class="form-group">
                        <label>SKU</label>
                        <input type="text" id="edit-sku" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="edit-name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="edit-category" class="form-control" required>
                            <option value="Electronics">Electronics</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Office Supplies">Office Supplies</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="edit-quantity" class="form-control" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" id="edit-price" class="form-control" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="edit-location" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Reorder Level</label>
                        <input type="number" id="edit-reorderLevel" class="form-control" min="0" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="updateItem()">Update Item</button>
                <button class="btn" onclick="closeModal('editItemModal')">Cancel</button>
            </div>
        </div>
    </div>
    
    <script src="../js/utils/storage.js"></script>
    <script src="../js/components/sidebar.js"></script>
    <script>
        let currentInventory = [];
        
        // Load sidebar
        fetch('../components/sidebar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
            });
        
        // Load inventory data
        function loadInventory() {
            currentInventory = Storage.getData('inventory');
            renderInventoryTable(currentInventory);
        }
        
        // Render inventory table
        function renderInventoryTable(items) {
            const tbody = document.getElementById('inventory-tbody');
            
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">No inventory items found</td></tr>';
                return;
            }
            
            tbody.innerHTML = items.map(item => {
                const status = item.quantity <= item.reorderLevel ? 'Low Stock' : 'In Stock';
                const statusClass = item.quantity <= item.reorderLevel ? 'badge-danger' : 'badge-success';
                
                return `
                    <tr>
                        <td>${item.sku}</td>
                        <td>${item.name}</td>
                        <td>${item.category}</td>
                        <td class="${item.quantity <= item.reorderLevel ? 'text-danger' : ''}">${item.quantity}</td>
                        <td>$${item.price.toFixed(2)}</td>
                        <td>${item.location}</td>
                        <td><span class="badge ${statusClass}">${status}</span></td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick="editItem(${item.id})">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteItem(${item.id})">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        // Filter inventory
        function filterInventory() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const stockFilter = document.getElementById('stockFilter').value;
            
            let filtered = currentInventory;
            
            // Apply search
            if (searchTerm) {
                filtered = filtered.filter(item => 
                    item.sku.toLowerCase().includes(searchTerm) ||
                    item.name.toLowerCase().includes(searchTerm) ||
                    item.category.toLowerCase().includes(searchTerm)
                );
            }
            
            // Apply category filter
            if (category) {
                filtered = filtered.filter(item => item.category === category);
            }
            
            // Apply stock filter
            if (stockFilter === 'low') {
                filtered = filtered.filter(item => item.quantity <= item.reorderLevel);
            } else if (stockFilter === 'normal') {
                filtered = filtered.filter(item => item.quantity > item.reorderLevel);
            }
            
            renderInventoryTable(filtered);
        }
        
        // Modal functions
        function openAddItemModal() {
            document.getElementById('addItemModal').style.display = 'block';
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
        
        // Save new item
        function saveNewItem() {
            const newItem = {
                sku: document.getElementById('sku').value,
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                quantity: parseInt(document.getElementById('quantity').value),
                price: parseFloat(document.getElementById('price').value),
                location: document.getElementById('location').value,
                reorderLevel: parseInt(document.getElementById('reorderLevel').value),
                lastUpdated: new Date().toISOString().split('T')[0]
            };
            
            Storage.addItem('inventory', newItem);
            closeModal('addItemModal');
            loadInventory();
            
            // Clear form
            document.getElementById('addItemForm').reset();
        }
        
        // Edit item
        function editItem(id) {
            const item = Storage.getItemById('inventory', id);
            if (item) {
                document.getElementById('edit-id').value = item.id;
                document.getElementById('edit-sku').value = item.sku;
                document.getElementById('edit-name').value = item.name;
                document.getElementById('edit-category').value = item.category;
                document.getElementById('edit-quantity').value = item.quantity;
                document.getElementById('edit-price').value = item.price;
                document.getElementById('edit-location').value = item.location;
                document.getElementById('edit-reorderLevel').value = item.reorderLevel;
                
                document.getElementById('editItemModal').style.display = 'block';
            }
        }
        
        // Update item
        function updateItem() {
            const id = parseInt(document.getElementById('edit-id').value);
            const updatedItem = {
                sku: document.getElementById('edit-sku').value,
                name: document.getElementById('edit-name').value,
                category: document.getElementById('edit-category').value,
                quantity: parseInt(document.getElementById('edit-quantity').value),
                price: parseFloat(document.getElementById('edit-price').value),
                location: document.getElementById('edit-location').value,
                reorderLevel: parseInt(document.getElementById('edit-reorderLevel').value),
                lastUpdated: new Date().toISOString().split('T')[0]
            };
            
            Storage.updateItem('inventory', id, updatedItem);
            closeModal('editItemModal');
            loadInventory();
        }
        
        // Delete item
        function deleteItem(id) {
            if (confirm('Are you sure you want to delete this item?')) {
                Storage.deleteItem('inventory', id);
                loadInventory();
            }
        }
        
        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterInventory);
        document.getElementById('categoryFilter').addEventListener('change', filterInventory);
        document.getElementById('stockFilter').addEventListener('change', filterInventory);
        
        // Close modals when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', loadInventory);
    </script>
</body>
</html>
